<div class="service-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Servicios</h1>
      <span class="page-subtitle">Catálogo de servicios del taller mecánico</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>add_circle</mat-icon>
      Nuevo Servicio
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar servicio</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Nombre, código o descripción..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredServices().length }} resultado(s)</span>
  </div>

  <app-service-table
    [data]="filteredServices()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
