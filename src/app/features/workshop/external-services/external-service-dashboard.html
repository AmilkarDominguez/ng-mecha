<div class="external-service-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Servicios Externos</h1>
      <span class="page-subtitle">Catálogo de servicios externos del taller</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>add_circle</mat-icon>
      Nuevo Servicio Externo
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar servicio externo</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Nombre o descripción..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredExternalServices().length }} resultado(s)</span>
  </div>

  <app-external-service-table
    [data]="filteredExternalServices()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
