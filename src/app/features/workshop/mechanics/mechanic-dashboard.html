<div class="mechanic-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Mecánicos</h1>
      <span class="page-subtitle">Gestión de mecánicos del taller</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>add_circle</mat-icon>
      Nuevo Mecánico
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar mecánico</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Nombre, CI, teléfono o correo..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredMechanics().length }} resultado(s)</span>
  </div>

  <app-mechanic-table
    [data]="filteredMechanics()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
