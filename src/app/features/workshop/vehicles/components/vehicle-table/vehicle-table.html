<div class="table-wrapper">
  <table mat-table [dataSource]="dataSource" matSort class="vehicle-table">

    <!-- Column: license_plate -->
    <ng-container matColumnDef="license_plate">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Placa</th>
      <td mat-cell *matCellDef="let row" class="cell-plate">{{ row.license_plate ?? '—' }}</td>
    </ng-container>

    <!-- Column: brand -->
    <ng-container matColumnDef="brand">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Marca</th>
      <td mat-cell *matCellDef="let row">{{ row.brand ?? '—' }}</td>
    </ng-container>

    <!-- Column: model -->
    <ng-container matColumnDef="model">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Modelo</th>
      <td mat-cell *matCellDef="let row">{{ row.model ?? '—' }}</td>
    </ng-container>

    <!-- Column: year -->
    <ng-container matColumnDef="year">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Año</th>
      <td mat-cell *matCellDef="let row">{{ row.year ?? '—' }}</td>
    </ng-container>

    <!-- Column: state -->
    <ng-container matColumnDef="state">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Estado</th>
      <td mat-cell *matCellDef="let row">
        <span class="status-badge"
          [class.status-active]="row.state === 'ACTIVE'"
          [class.status-inactive]="row.state === 'INACTIVE'">
          {{ row.state === 'ACTIVE' ? 'Activo' : 'Inactivo' }}
        </span>
      </td>
    </ng-container>

    <!-- Column: actions -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="col-actions">Acciones</th>
      <td mat-cell *matCellDef="let row" class="col-actions">
        <button mat-icon-button color="primary" matTooltip="Ver detalle" (click)="view.emit(row)">
          <mat-icon>visibility</mat-icon>
        </button>
        <button mat-icon-button matTooltip="Editar" (click)="edit.emit(row)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" matTooltip="Eliminar" (click)="delete.emit(row)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row"></tr>

    <tr class="mat-mdc-row" *matNoDataRow>
      <td class="no-data-cell" [attr.colspan]="displayedColumns.length">
        <mat-icon>search_off</mat-icon>
        <span>No se encontraron vehículos</span>
      </td>
    </tr>

  </table>

  <mat-paginator
    [pageSizeOptions]="[5, 10, 25]"
    [pageSize]="10"
    showFirstLastButtons
    aria-label="Paginación de vehículos">
  </mat-paginator>

</div>
