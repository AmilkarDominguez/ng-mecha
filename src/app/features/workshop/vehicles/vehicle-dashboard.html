<div class="vehicle-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Vehículos</h1>
      <span class="page-subtitle">Registro de vehículos de clientes del taller</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>add_circle</mat-icon>
      Nuevo Vehículo
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar vehículo</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Placa, marca, modelo o año..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredVehicles().length }} resultado(s)</span>
  </div>

  <app-vehicle-table
    [data]="filteredVehicles()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
