<div class="tab-labor">

  <div class="section-title">Mano de Obra</div>

  <div class="search-row">
    <mat-form-field appearance="outline" class="field-full">
      <mat-label>Servicio</mat-label>
      <input matInput [formControl]="serviceCtrl" [matAutocomplete]="autoService"
             (input)="onServiceInputChange()" placeholder="Buscar servicio..." />
      <mat-autocomplete #autoService="matAutocomplete" [displayWith]="displayService"
                        (optionSelected)="onServiceSelected($event.option.value)">
        @for (s of filteredServices(); track s.id) {
          <mat-option [value]="s">
            <span class="option-main">{{ s.name }}</span>
            @if (s.code) {
              <span class="option-sub">{{ s.code }}</span>
            }
            @if (s.price != null) {
              <span class="option-price">Bs. {{ s.price | number:'1.2-2' }}</span>
            }
          </mat-option>
        }
      </mat-autocomplete>
    </mat-form-field>
    <button mat-icon-button color="primary" class="quick-add-btn"
            matTooltip="Registrar nuevo servicio"
            (click)="openNewServiceDialog()">
      <mat-icon>add_circle</mat-icon>
    </button>
  </div>

  <form [formGroup]="form" class="add-fields">
    <mat-form-field appearance="outline">
      <mat-label>Precio (Bs.)</mat-label>
      <input matInput type="number" formControlName="price" min="0" step="1" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Cantidad</mat-label>
      <input matInput type="number" formControlName="quantity" min="1" step="1" />
    </mat-form-field>

    <button mat-flat-button color="primary" class="add-btn" (click)="onAdd()">
      Agregar
    </button>
  </form>

</div>
