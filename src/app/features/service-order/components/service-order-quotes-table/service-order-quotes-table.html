<div class="table-wrapper">
  <div class="table-header">
    <span class="table-title">Cotizaciones a Convertir</span>
    <span class="table-count">{{ items().length }} item(s)</span>
  </div>

  @if (items().length > 0) {
    <div class="table-scroll">
      <table mat-table [dataSource]="items()" class="detail-table">

        <ng-container matColumnDef="item">
          <th mat-header-cell *matHeaderCellDef>#</th>
          <td mat-cell *matCellDef="let row; let i = index">{{ i + 1 }}</td>
        </ng-container>

        <ng-container matColumnDef="number">
          <th mat-header-cell *matHeaderCellDef>Cotización</th>
          <td mat-cell *matCellDef="let row">{{ quoteLabel(row) }}</td>
        </ng-container>

        <ng-container matColumnDef="expiration">
          <th mat-header-cell *matHeaderCellDef>Vencimiento</th>
          <td mat-cell *matCellDef="let row">{{ row.expiration_date ?? '—' }}</td>
        </ng-container>

        <ng-container matColumnDef="total">
          <th mat-header-cell *matHeaderCellDef>Total</th>
          <td mat-cell *matCellDef="let row" class="cell-amount">
            Bs. {{ row.total | number:'1.2-2' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let row">
            <button mat-icon-button color="warn" (click)="onRemove(row.id)" title="Quitar">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columns"></tr>
        <tr mat-row *matRowDef="let row; columns: columns;"></tr>
      </table>
    </div>
  } @else {
    <div class="empty-state">Sin cotizaciones agregadas a esta orden</div>
  }
</div>
