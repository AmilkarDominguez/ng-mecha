<h2 mat-dialog-title class="modal-title">
  <mat-icon class="modal-title-icon">warning</mat-icon>
  Confirmar Eliminación
</h2>

<mat-dialog-content class="modal-content">
  <p class="confirm-message">
    ¿Está seguro de que desea eliminar el ingreso de
    <strong>{{ history.amount | currency:'BOB':'symbol':'1.2-2' }}</strong>
    registrado en <strong>{{ history.bank_account?.name ?? 'la cuenta' }}</strong>?
  </p>
  <p class="confirm-warning">Esta acción revertirá el saldo de la cuenta y no se puede deshacer.</p>
</mat-dialog-content>

<mat-dialog-actions class="modal-actions" align="end">
  <button mat-stroked-button (click)="onCancel()">Cancelar</button>
  <button mat-flat-button color="warn" (click)="onConfirm()">
    <mat-icon>delete</mat-icon>
    Eliminar
  </button>
</mat-dialog-actions>
