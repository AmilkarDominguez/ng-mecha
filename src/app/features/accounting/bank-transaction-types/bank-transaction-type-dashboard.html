<div class="transaction-type-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Tipos de Transacción</h1>
      <span class="page-subtitle">Catálogo de tipos de movimiento bancario</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>add_circle</mat-icon>
      Nuevo Tipo
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar tipo</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Nombre o descripción..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredItems().length }} resultado(s)</span>
  </div>

  <app-bank-transaction-type-table
    [data]="filteredItems()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
