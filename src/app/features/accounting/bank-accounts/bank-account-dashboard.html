<div class="bank-account-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Cuentas Bancarias</h1>
      <span class="page-subtitle">Registro y gestión de cuentas bancarias del taller</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>add_circle</mat-icon>
      Nueva Cuenta
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar cuenta</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Nombre, número o descripción..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredAccounts().length }} resultado(s)</span>
  </div>

  <app-bank-account-table
    [data]="filteredAccounts()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
