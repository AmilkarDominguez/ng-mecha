<div class="transfer-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Transferencias de Propiedad</h1>
      <span class="page-subtitle">Historial de cambios de propietario por animal en corrales</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>swap_horiz</mat-icon>
      Nueva Transferencia
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar transferencia</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Animal, ganadero, marca o motivo..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredTransfers().length }} resultado(s)</span>
  </div>

  <app-ownership-transfer-table
    [data]="filteredTransfers()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
