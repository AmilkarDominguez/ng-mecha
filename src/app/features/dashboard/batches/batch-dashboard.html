<div class="batch-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Lotes de Inventario</h1>
      <span class="page-subtitle">Registro de lotes de productos con precios y existencias por almacén</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>add</mat-icon>
      Nuevo Lote
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar lote</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Código, producto, almacén, marca, modelo..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredBatches().length }} resultado(s)</span>
  </div>

  <app-batch-table
    [data]="filteredBatches()"
    [products]="products"
    [warehouses]="warehouses"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
