<div class="brand-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Marcas</h1>
      <span class="page-subtitle">Marcas de repuestos y productos registradas en el inventario</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>add</mat-icon>
      Nueva Marca
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar marca</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Nombre, descripción, calificación..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredBrands().length }} resultado(s)</span>
  </div>

  <app-brand-table
    [data]="filteredBrands()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
