<div class="warehouse-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Almacenes</h1>
      <span class="page-subtitle">Gestión de almacenes y espacios de inventario del taller</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>add</mat-icon>
      Nuevo Almacén
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar almacén</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Nombre o descripción..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredWarehouses().length }} resultado(s)</span>
  </div>

  <app-warehouse-table
    [data]="filteredWarehouses()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
