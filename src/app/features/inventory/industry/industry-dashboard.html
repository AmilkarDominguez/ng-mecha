<div class="industry-page">

  <div class="page-header">
    <div class="page-title-group">
      <h1 class="page-title">Industrias / Sectores</h1>
      <span class="page-subtitle">Industria o país de origen de los productos y repuestos</span>
    </div>
    <button mat-flat-button color="primary" class="add-button" (click)="openCreateModal()">
      <mat-icon>add_circle</mat-icon>
      Nueva Industria
    </button>
  </div>

  <div class="toolbar-row">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar industria</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Ej. China, Nacional, Japonesa..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
    <span class="result-count">{{ filteredIndustries().length }} resultado(s)</span>
  </div>

  <app-industry-table
    [data]="filteredIndustries()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
  />

</div>
