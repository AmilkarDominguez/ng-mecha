<mat-sidenav-container class="sidenav-container">

  <mat-sidenav mode="side" [opened]="sidenavOpen()">
    <div class="sidenav-header">
        <mat-icon class="sidenav-logo" aria-hidden="false" aria-label="home" fontIcon="home"></mat-icon>
      <span class="sidenav-brand">Mecatronica</span>
    </div>
    <mat-divider />
    <app-nav-menu (onClick)="sidenavOpen.set(!sidenavOpen())" />
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="toolbar">
      <button mat-icon-button (click)="sidenavOpen.set(!sidenavOpen())" aria-label="Toggle menu">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-title">Sistema de Inventario</span>
      <span class="toolbar-spacer"></span>
      @if (currentUser(); as user) {
        <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-trigger">
          <mat-icon>account_circle</mat-icon>
          <span class="user-name">{{ user.name ?? user.email }}</span>
        </button>
        <mat-menu #userMenu="matMenu">
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Cerrar sesion</span>
          </button>
        </mat-menu>
      }
    </mat-toolbar>
    <main class="content">
      <router-outlet />
    </main>
  </mat-sidenav-content>

</mat-sidenav-container>
